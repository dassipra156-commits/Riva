<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticker Haven - Premium Stickers for Everyone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-links a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #ff6b6b;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.3);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: fadeInUp 1s ease-out;
        }

        .hero p {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            animation: fadeInUp 1s ease-out 0.2s both;
        }

        .cta-button {
            display: inline-block;
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            color: white;
            padding: 1rem 2.5rem;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
            animation: fadeInUp 1s ease-out 0.4s both;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
        }

        /* Stickers Grid */
        .stickers-section {
            padding: 100px 0;
            background: white;
        }

        .section-title {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 4rem;
            color: #333;
        }

        .stickers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .sticker-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .sticker-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .sticker-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .sticker-card:hover .sticker-image {
            transform: scale(1.05);
        }

        .sticker-info {
            padding: 1.5rem;
        }

        .sticker-name {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: #333;
        }

        .sticker-price {
            font-size: 1.8rem;
            color: #ff6b6b;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .add-to-cart {
            width: 100%;
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .add-to-cart:hover {
            transform: scale(1.02);
        }

        /* Cart */
        .cart {
            position: fixed;
            top: 100px;
            right: -400px;
            width: 400px;
            height: calc(100vh - 120px);
            background: white;
            box-shadow: -5px 0 20px rgba(0,0,0,0.2);
            transition: right 0.3s ease;
            z-index: 2000;
            overflow-y: auto;
            padding: 2rem;
            border-radius: 20px 0 0 20px;
        }

        .cart.open {
            right: 0;
        }

        .cart-toggle {
            position: fixed;
            top: 120px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 1500;
            box-shadow: 0 5px 20px rgba(255,107,107,0.4);
        }

        .cart h3 {
            margin-bottom: 1.5rem;
            color: #333;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid #eee;
        }

        .total {
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 2px solid #eee;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.5rem;
            }
            
            .nav-links {
                display: none;
            }
            
            .cart {
                width: 100%;
                right: -100%;
            }
        }

        /* Floating stickers animation */
        .floating-stickers {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .floating-sticker {
            position: absolute;
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }
    </style>
</head>
<body>
    <header>
        <nav class="container">
            <a href="#" class="logo">Sticker Haven</a>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#stickers">Stickers</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section id="home" class="hero">
        <div class="floating-stickers">
            <div class="floating-sticker" style="top: 20%; left: 10%; animation-delay: 0s;"></div>
            <div class="floating-sticker" style="top: 60%; right: 15%; animation-delay: 2s;"></div>
            <div class="floating-sticker" style="bottom: 20%; left: 20%; animation-delay: 4s;"></div>
        </div>
        <div class="hero-content">
            <h1>Sticker Paradise</h1>
            <p>Discover thousands of unique, high-quality stickers for your laptops, phones, water bottles, and more!</p>
            <a href="#stickers" class="cta-button">Shop Now</a>
        </div>
    </section>

    <section id="stickers" class="stickers-section">
        <div class="container">
            <h2 class="section-title">Featured Stickers</h2>
            <div class="stickers-grid" id="stickersGrid">
                <!-- Stickers will be generated by JavaScript -->
            </div>
        </div>
    </section>

    <button class="cart-toggle" id="cartToggle">🛒</button>
    <div class="cart" id="cart">
        <h3>Shopping Cart</h3>
        <div id="cartItems"></div>
        <div class="total" id="cartTotal">$0.00</div>
        <button class="add-to-cart" style="margin-top: 1rem;" onclick="checkout()">Checkout</button>
    </div>

    <script>
        // Sticker data
        const stickers = [
            { id: 1, name: "Retro Cat", price: 2.99, image: "https://images.unsplash.com/photo-1573865526739-10659fec78a5?w=400&h=300&fit=crop&crop=center" },
            { id: 2, name: "Space Rocket", price: 3.49, image: "https://images.unsplash.com/photo-1462331940025-496dfbfc7564?w=400&h=300&fit=crop&crop=center" },
            { id: 3, name: "Pizza Slice", price: 1.99, image: "https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400&h=300&fit=crop&crop=center" },
            { id: 4, name: "Cactus Buddy", price: 2.79, image: "https://images.unsplash.com/photo-1558618047-3c8c76bbb17e?w=400&h=300&fit=crop&crop=center" },
            { id: 5, name: "Sunset Palm", price: 3.25, image: "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=300&fit=crop&crop=center" },
            { id: 6, name: "Coffee Cup", price: 2.49, image: "https://images.unsplash.com/photo-1572444654109-38c5a5698c0f?w=400&h=300&fit=crop&crop=center" },
            { id: 7, name: "Mountain Peak", price: 3.99, image: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=400&h=300&fit=crop&crop=center" },
            { id: 8, name: "Dancing Dino", price: 2.89, image: "https://images.unsplash.com/photo-1578662996442-48f60103fc96?w=400&h=300&fit=crop&crop=center" }
        ];

        let cart = [];

        // Generate stickers grid
        function generateStickers() {
            const grid = document.getElementById('stickersGrid');
            grid.innerHTML = '';
            
            stickers.forEach(sticker => {
                const card = document.createElement('div');
                card.className = 'sticker-card';
                card.innerHTML = `
                    <img src="${sticker.image}" alt="${sticker.name}" class="sticker-image">
                    <div class="sticker-info">
                        <div class="sticker-name">${sticker.name}</div>
                        <div class="sticker-price">$${sticker.price.toFixed(2)}</div>
                        <button class="add-to-cart" onclick="addToCart(${sticker.id})">Add to Cart</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Cart functionality
        function addToCart(stickerId) {
            const sticker = stickers.find(s => s.id === stickerId);
            const existingItem = cart.find(item => item.id === stickerId);
            
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...sticker, quantity: 1 });
            }
            
            updateCart();
        }

        function updateCart() {
            const cartItems = document.getElementById('cartItems');
            const cartTotal = document.getElementById('cartTotal');
            
            cartItems.innerHTML = '';
            let total = 0;
            
            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                
                const cartItem = document.createElement('div');
                cartItem.className = 'cart-item';
                cartItem.innerHTML = `
                    <div>
                        <strong>${item.name}</strong><br>
                        $${item.price.toFixed(2)} x ${item.quantity}
                    </div>
                    <div>
                        $${itemTotal.toFixed(2)}
                        <button onclick="removeFromCart(${item.id})" style="margin-left: 10px; background: #ff6b6b; border: none; color: white; border-radius: 5px; padding: 5px 10px; cursor: pointer;">Remove</button>
                    </div>
                `;
                cartItems.appendChild(cartItem);
            });
            
            cartTotal.textContent = `Total: $${total.toFixed(2)}`;
        }

        function removeFromCart(stickerId) {
            cart = cart.filter(item => item.id !== stickerId);
            updateCart();
        }

        function checkout() {
            if (cart.length === 0) {
                alert('Your cart is empty!');
                return;
            }
            alert(`Thank you for your order! Total: $${cart.reduce((sum, item) => sum + (item.price * item.quantity), 0).toFixed(2)}`);
            cart = [];
            updateCart();
        }

        // Cart toggle
        document.getElementById('cartToggle').addEventListener('click', function() {
            const cart = document.getElementById('cart');
            cart.classList.toggle('open');
        });

        // Smooth scrolling for nav links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });

        // Initialize
        generateStickers();
    </script>
</body>
  </html>
